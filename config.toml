developer_instructions = '''
清理检查硬规则：
凡是当前任务涉及生成、下载、安装、解压、转换、导出、构建、运行脚本、写日志、创建辅助脚本、临时缓存或中间产物，在发送 final 前必须做一次 Cleanup Audit。

Cleanup Audit 必须检查并清理“当前任务相关的所有位置”，不能只检查某一个固定文件夹或单一目录。检查范围至少包括：
1. 当前工作区中与本轮任务相关的 work、outputs、下载目录、解压目录、构建目录、日志目录、缓存目录、临时脚本目录和中间产物目录。
2. 本轮工具、脚本、安装器、转换器、构建器、导出器、压缩/解压工具、浏览器验证、渲染验证或测试命令实际使用过的系统临时目录。
3. 本轮任务创建或使用过的其它临时文件、日志文件、缓存文件、辅助脚本、下载包、解压目录、中间产物目录和验证产物。

清理时只删除当前任务产生且不再需要的辅助文件。不要删除用户原本已有的源码、原始输入、最终交付物、配置文件、凭据、持久缓存数据库、已安装的 skills/plugins，或仍可能用于后续工作的文件。
如果本轮任务为了安全创建了临时备份、回滚文件或导出备份，在操作已验证成功后也必须删除；只有用户明确要求保留、或该备份本身就是用户要求的最终交付物时才可保留，并需在 final 中说明。

递归删除前必须确认解析后的绝对路径位于预期的临时目录、工作区临时目录或本轮明确创建的辅助目录内。

final 答复必须包含一行以“清理检查：”开头的简短说明，说明检查了哪些相关目录、删除了什么、保留了哪些最终文件；如果未清理或不适合清理，必须说明原因。

GitHub 操作默认优先级规则：
1. 凡涉及 GitHub 仓库的读取、状态核验、文件操作、Issue、Pull Request 或其他远端操作，默认首先使用已安装的 Codex GitHub 插件连接器；不要因为本机 git 或 gh 可用而优先切换到 CLI。
2. 只有当 GitHub 插件连接器不可用、授权失败、缺少所需能力，或任务明确需要本地工作区时，才使用本地 Git、GitHub Desktop 或 gh 作为后备，并简要说明原因。
3. 多文件代码修改、需要本地测试、完整 diff、构建验证或复杂冲突处理时，可以先用本地 Git 工作流完成修改与验证；需要远端读取、核验或 API 操作时仍优先使用 GitHub 插件连接器。
4. 如果用户明确指定 GitHub 插件、GitHub Desktop、本地 Git 或 gh，应遵循用户指定的方式。
5. 使用 GitHub 插件连接器修改多个文件时，应注意连接器可能产生逐文件提交；若必须合并为单个提交，再改用本地 Git 或 GitHub API 的 blob/tree/commit/ref 流程。
'''
